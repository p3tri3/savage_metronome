name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: fmt + clippy (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install ALSA dev libraries
        run: sudo apt-get update -q && sudo apt-get install -y libasound2-dev

      - name: rustfmt check
        run: cargo fmt --all -- --check

      - name: clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: clippy (--no-default-features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  test_nofeatures:
    name: tests --no-default-features (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Test (mock audio)
        run: cargo test --no-default-features

  test_default:
    name: tests (default features, ubuntu)
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install ALSA dev libraries
        run: sudo apt-get update -q && sudo apt-get install -y libasound2-dev

      - name: Test (default features)
        run: cargo test
