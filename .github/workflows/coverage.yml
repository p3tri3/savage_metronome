name: Coverage

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install ALSA dev libraries
        run: sudo apt-get update -q && sudo apt-get install -y libasound2-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Coverage (default features)
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Coverage (--no-default-features)
        run: cargo llvm-cov --no-default-features --lcov --output-path lcov-nodflt.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,lcov-nodflt.info
          fail_ci_if_error: false
